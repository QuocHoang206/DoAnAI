<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Expense Tracker - Nhập liệu</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: #f4f7fb; color: #172033; }
    .page { width: min(960px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0; }
    .header { margin-bottom: 20px; }
    h1 { margin: 0 0 8px; font-size: 30px; line-height: 1.2; }
    .subtitle { margin: 0; color: #667085; line-height: 1.5; }
    .card { background: #fff; border: 1px solid #dbe3ef; border-radius: 8px; padding: 22px; box-shadow: 0 10px 30px rgba(15,23,42,0.07); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 10px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 14px; }
    textarea { height: 100px; resize: vertical; }
    .btn { background: #172033; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; font-size: 16px; }
    .btn:hover { background: #2b3a53; }
    .status { margin-top: 15px; text-align: center; font-size: 14px; color: #dc2626; }
    .section-title { font-size: 16px; color: #172033; font-weight: bold; border-left: 4px solid #172033; padding-left: 10px; margin: 20px 0 15px 0; }
  </style>
</head>
<body>
  <main class="page">
    <div class="header">
      <h1>💰 Quản lý chi tiêu Sinh viên</h1>
      <p class="subtitle">Dữ liệu đầu vào để AI phân tích và dự báo tài chính</p>
    </div>

    <div class="card">
      <div class="section-title">👤 Thông tin sinh viên</div>
      <div class="grid">
        <div class="field">
          <label>Họ tên</label>
          <input type="text" id="name" placeholder="Quoc Hoang">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="example@gmail.com">
        </div>
      </div>
      <div class="grid">
        <div class="field">
          <label>Thu nhập tháng (Trợ cấp/Làm thêm)</label>
          <input type="number" id="income" placeholder="Ví dụ: 5000000">
        </div>
        <div class="field">
          <label>Mục tiêu tiết kiệm tháng</label>
          <input type="number" id="saving_goal" placeholder="Ví dụ: 1000000">
        </div>
      </div>

      <div class="section-title">💸 Giao dịch hôm nay</div>
      <div class="grid">
        <div class="field">
          <label>Ngày giao dịch</label>
          <input type="date" id="date">
        </div>
        <div class="field">
          <label>Ngân sách tháng này</label>
          <input type="number" id="budget" placeholder="Ví dụ: 3000000">
        </div>
      </div>
      <div class="field">
        <label>Nội dung chi tiêu (Nhập văn bản tự nhiên)</label>
        <textarea id="expenseText" placeholder="Ví dụ: sáng ăn bún bò 35k, mua giáo trình 120k, chiều đi trà sữa với bạn 45k..."></textarea>
      </div>

      <button id="submitBtn" class="btn">Phân Tích Bằng DeepSeek</button>
      <div class="status" id="statusText"></div>
    </div>
  </main>

  <script>
  const WEBHOOK_URL = 'https://truongmaiquochoang.app.n8n.cloud/webhook/expense-analyzer';
  const dateInput = document.getElementById('date');
  const statusText = document.getElementById('statusText');

  // 1. Chặn ngày tương lai: Thiết lập thuộc tính max là ngày hôm nay
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const todayStr = `${yyyy}-${mm}-${dd}`;
  
  dateInput.max = todayStr; // Người dùng không thể chọn ngày sau hôm nay
  dateInput.value = todayStr;

  document.getElementById('submitBtn').addEventListener('click', function () {
    const nameInput = document.getElementById('name').value.trim();
    const emailInput = document.getElementById('email').value.trim();
    const income = document.getElementById('income').value;
    const saving_goal = document.getElementById('saving_goal').value;
    const date = dateInput.value;
    const budget = document.getElementById('budget').value;
    const expenseText = document.getElementById('expenseText').value.trim();

    // 2. Ràng buộc Họ tên: Chỉ cho phép chữ cái (bao gồm tiếng Việt có dấu) và khoảng trắng
    const nameRegex = /^[a-zA-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚĂĐĨŨƠàáâãèéêìíòóôõùúăđĩũơƯĂÂÊÔƠƯ \s]+$/;
    
    // 3. Ràng buộc Email: Kiểm tra định dạng email chuẩn
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // KIỂM TRA LỖI
    if (!nameInput || !emailInput || !expenseText || !budget || !income) {
      statusText.textContent = 'Vui lòng điền đầy đủ các thông tin.';
      return;
    }

    if (!nameRegex.test(nameInput)) {
      statusText.textContent = 'Họ tên không hợp lệ (chỉ được chứa chữ cái).';
      return;
    }

    if (!emailRegex.test(emailInput)) {
      statusText.textContent = 'Email không đúng định dạng.';
      return;
    }

    if (new Date(date) > today) {
      statusText.textContent = 'Ngày giao dịch không thể ở tương lai.';
      return;
    }

    // Nếu mọi thứ ổn, tiến hành gửi dữ liệu
    statusText.textContent = ''; // Xóa thông báo lỗi
    const currentDay = today.getDate();
    const totalDays = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();

    const payload = {
      Name: nameInput.toLowerCase(),
      Email: emailInput.toLowerCase(),
      Income: Number(income),
      Saving_Goal: Number(saving_goal) || 0,
      Date: date,
      Monthly_Budget: Number(budget),
      Expense_Text: expenseText,
      Record_ID: 'EXP' + Date.now(),
      Current_Day: currentDay,
      Total_Days: totalDays
    };

    localStorage.setItem('expense_input', JSON.stringify(payload));
    window.location.href = 'KQ.html';
  });
</script>
</body>
</html>
