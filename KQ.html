<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Phân Tích Tài Chính Chi Tiết</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f7fb; color: #172033; }
    .page { width: min(1000px, calc(100% - 32px)); margin: auto; padding: 30px 0; }
    .card { background: #fff; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    .metric-box { display: flex; flex-wrap: wrap; gap: 15px; }
    .metric { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px; flex: 1; }
    .metric label { font-size: 13px; color: #64748b; display: block; margin-bottom: 5px; }
    .metric b { font-size: 18px; color: #0f172a; }
    .highlight-card { background: #1e293b; color: #fff; padding: 20px; border-radius: 12px; }
    .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
    #loading { text-align: center; padding: 50px; font-size: 20px; }
    h3 { margin-top: 0; color: #1e293b; font-size: 18px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="page">
    <div id="loading">AI đang tổng hợp dữ liệu lịch sử...</div>
    <div id="mainContent" style="display:none;">
      <h1>📊 Dashboard Tài Chính</h1>
      
      <div class="grid">
        <div class="metric-box">
          <div class="metric"><label>Hôm nay</label><b id="todayTotal">0đ</b></div>
          <div class="metric"><label>Trạng thái</label><b id="statusText">--</b></div>
          <div class="metric"><label>Dự báo cuối tháng</label><b id="prediction">0đ</b></div>
          <div class="metric"><label>Nhóm chi chính</label><b id="mainCategory">--</b></div>
          <div class="metric" style="border-top: 3px solid #3b82f6;"><label>Tuần này</label><b id="weeklyTotal">0đ</b></div>
          <div class="metric" style="border-top: 3px solid #a855f7;"><label>Tháng này</label><b id="monthlyTotal">0đ</b></div>
        </div>
        <div class="highlight-card">
          <h3>🔮 Gợi ý từ AI</h3>
          <p id="smartAdvice"></p>
        </div>
      </div>

      <div class="grid" style="margin-top: 20px;">
        <div class="card"><h3>🍕 Phân bổ hôm nay</h3><canvas id="categoryChart"></canvas></div>
        <div class="card"><h3>📊 Xu hướng chi tiêu</h3><canvas id="trendChart"></canvas></div>
      </div>

      <div class="grid">
        <!-- Card bên trái: Chi tiết vừa nhập -->
        <div class="card">
          <h3>📝 Chi tiết hôm nay</h3>
          <div id="itemsContainer"></div>
        </div>
        
        <!-- Card bên phải: Lịch sử ngày trước -->
        <div class="card">
          <h3>📅 Lịch sử các ngày trước</h3>
          <div id="historyContainer">
            <p style="text-align: center; color: #64748b; padding: 20px;">Đang tải lịch sử...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function drawCharts(data) {
        const items = JSON.parse(data.Items_JSON || '[]');
        const catMap = {};
        items.forEach(i => {
            const cat = i.category || 'Khác';
            catMap[cat] = (catMap[cat] || 0) + (Number(i.amount) || 0);
        });

        new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: { 
                labels: Object.keys(catMap), 
                datasets: [{ 
                    data: Object.values(catMap), 
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] 
                }] 
            }
        });

        new Chart(document.getElementById('trendChart'), {
            type: 'bar',
            data: { 
                labels: ['Hôm nay', 'Tuần', 'Tháng'], 
                datasets: [{ 
                    label: 'VNĐ', 
                    data: [
                        Number(data.Today_Total) || 0, 
                        Number(data.Weekly_Total) || 0, 
                        Number(data.Monthly_Total) || 0
                    ], 
                    backgroundColor: ['#1e293b', '#3b82f6', '#a855f7'] 
                }] 
            },
            options: { scales: { y: { beginAtZero: true } } }
        });
    }

    async function analyze() {
        const inputStr = localStorage.getItem('expense_input');
        if (!inputStr) {
            document.getElementById('loading').innerText = "Vui lòng nhập liệu trước!";
            return;
        }

        try {
            const response = await fetch('https://truongmaiquochoang.app.n8n.cloud/webhook/expense-analyzer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: inputStr
            });
            
            const data = await response.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            // 1. Cập nhật các con số tổng quát
            document.getElementById('todayTotal').innerText = (data.Today_Total || 0).toLocaleString() + 'đ';
            document.getElementById('weeklyTotal').innerText = (data.Weekly_Total || 0).toLocaleString() + 'đ';
            document.getElementById('monthlyTotal').innerText = (data.Monthly_Total || 0).toLocaleString() + 'đ';
            document.getElementById('statusText').innerText = data.Budget_Status || '--';
            document.getElementById('prediction').innerText = (data.Prediction || 0).toLocaleString() + 'đ';
            document.getElementById('mainCategory').innerText = data.Category || 'Khác';
            document.getElementById('smartAdvice').innerText = data.Smart_Advice || 'Dữ liệu đang được phân tích...';

            // 2. Hiển thị chi tiết hôm nay
            const items = JSON.parse(data.Items_JSON || '[]');
            const container = document.getElementById('itemsContainer');
            container.innerHTML = ''; 
            items.forEach(item => {
                container.innerHTML += `<div class="item"><span>${item.name}</span><b>${(Number(item.amount) || 0).toLocaleString()}đ</b></div>`;
            });

            // 3. ✅ HIỂN THỊ LỊCH SỬ CÁC NGÀY TRƯỚC
            const historyList = JSON.parse(data.History_List || '[]');
            const historyContainer = document.getElementById('historyContainer');
            historyContainer.innerHTML = ''; 

            if (historyList.length === 0) {
                historyContainer.innerHTML = '<p style="color: #64748b; text-align: center; padding: 20px;">Chưa có dữ liệu lịch sử.</p>';
            } else {
                historyList.forEach(rec => {
                    historyContainer.innerHTML += `
                        <div class="item" style="border-left: 4px solid #cbd5e1; padding-left: 10px; margin-bottom: 10px; align-items: center;">
                            <div style="flex: 1;">
                                <small style="color: #64748b; font-size: 11px;">${rec.date} • ${rec.category}</small>
                                <div style="font-weight: 500; color: #334155;">${rec.content}</div>
                            </div>
                            <b style="color: #1e293b;">${(Number(rec.amount) || 0).toLocaleString()}đ</b>
                        </div>`;
                });
            }
            
            drawCharts(data);
        } catch (e) {
            document.getElementById('loading').innerText = "Lỗi kết nối hệ thống: " + e.message;
        }
    }
    analyze();
  </script>
</body>
</html>
