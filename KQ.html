<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kết quả phân tích chi tiêu</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f7fb; color: #172033; }
    .page { width: min(1000px, calc(100% - 32px)); margin: auto; padding: 30px 0; }
    .card { background: #fff; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
    h1 { margin: 0; font-size: 24px; color: #1e293b; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    
    .metric-box { display: flex; flex-wrap: wrap; gap: 15px; }
    .metric { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px; flex: 1; }
    .metric label { font-size: 13px; color: #64748b; display: block; margin-bottom: 5px; }
    .metric b { font-size: 18px; color: #0f172a; }

    .highlight-card { background: #1e293b; color: #fff; padding: 20px; border-radius: 12px; height: fit-content; }
    .advice-section { border-left: 4px solid #3b82f6; padding-left: 15px; margin-top: 15px; }
    .warning-section { border-left: 4px solid #ef4444; padding-left: 15px; margin-top: 15px; color: #fca5a5; }

    .item-list { margin-top: 20px; }
    .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; align-items: center; }
    .tag { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-right: 5px; text-transform: uppercase; }
    .eat { background: #dcfce7; color: #166534; }
    .study { background: #dbeafe; color: #1e40af; }
    .fun { background: #fef9c3; color: #854d0e; }
    .other { background: #f1f5f9; color: #475569; }
    
    #loading { text-align: center; padding: 100px; font-size: 18px; font-weight: bold; }
    .btn-back { padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; background: white; cursor: pointer; }
  </style>
</head>
<body>
  <div class="page">
    <div id="loading"> AI đang phân tích dữ liệu và dự báo...</div>
    
    <div id="mainContent" style="display:none;">
      <div class="header-flex">
        <h1>📊 Phân Tích Tài Chính</h1>
        <button class="btn-back" onclick="window.location.href='AI.html'">Quay lại nhập liệu</button>
      </div>

      <div class="grid">
        <div class="metric-box">
    <div class="metric">
        <label>Tổng chi hôm nay</label>
        <b id="todayTotal">0đ</b>
    </div>
    <div class="metric">
        <label>Trạng thái ngân sách</label>
        <b id="statusText">--</b>
    </div>
    <div class="metric">
        <label>Dự báo chi cuối tháng</label>
        <b id="prediction">0đ</b>
    </div>
    <div class="metric">
        <label>Nhóm chi chính</label>
        <b id="mainCategory">--</b>
    </div>
    <!-- Hai ô mới cùng định dạng với các ô trên -->
    <div class="metric" style="border-top: 3px solid #3b82f6;">
        <label>Tổng chi tuần này</label>
        <b id="weeklyTotal" style="color: #2563eb;">0đ</b>
    </div>
    <div class="metric" style="border-top: 3px solid #a855f7;">
        <label>Tổng chi tháng này</label>
        <b id="monthlyTotal" style="color: #7c3aed;">0đ</b>
    </div>
</div>

        <div class="highlight-card">
          <h3>🔮 Gợi ý từ AI</h3>
          <div class="advice-section">
            <p id="smartAdvice">AI đang soạn lời khuyên cho bạn...</p>
          </div>
          <div class="warning-section" id="warningBox" style="display:none;">
            <b>🚨 Cảnh báo chi tiêu:</b> <br>
            <span id="warningText"></span>
          </div>
        </div>
      </div>

      <div class="card item-list">
        <h3>📝 Danh sách chi tiết bóc tách từ văn bản</h3>
        <div id="itemsContainer"></div>
      </div>
    </div>
  </div>

  <script>
    async function analyze() {
      const input = JSON.parse(localStorage.getItem('expense_input'));
      if (!input) {
          document.getElementById('loading').textContent = 'Không tìm thấy dữ liệu đầu vào. Vui lòng quay lại.';
          return;
      }

      try {
        const response = await fetch('https://truongmaiquochoang.app.n8n.cloud/webhook/expense-analyzer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(input)
        });

       const data = await response.json();
document.getElementById('loading').style.display = 'none';
document.getElementById('mainContent').style.display = 'block';

// Hiển thị các Metric (Dùng đúng tên trường từ Prompt AI)
document.getElementById('todayTotal').textContent = (data.Today_Total || 0).toLocaleString() + 'đ';
document.getElementById('statusText').textContent = data.Budget_Status || '--';
document.getElementById('prediction').textContent = (data.Prediction || 0).toLocaleString() + 'đ';
document.getElementById('mainCategory').textContent = data.Category || 'Khác';

// Hiển thị dữ liệu tuần và tháng
const weekly = data.Weekly_Total || 0;
const monthly = data.Monthly_Total || 0;
document.getElementById('weeklyTotal').innerText = weekly.toLocaleString() + 'đ';
document.getElementById('monthlyTotal').innerText = monthly.toLocaleString() + 'đ';
// Hiển thị Lời khuyên và Cảnh báo (Sửa từ .Advice thành .Smart_Advice)
document.getElementById('smartAdvice').textContent = data.Smart_Advice || 'Hãy tiếp tục theo dõi chi tiêu mỗi ngày nhé!';
        
        if (data.Warning) {
          document.getElementById('warningBox').style.display = 'block';
          document.getElementById('warningText').textContent = data.Warning;
        }

        // Hiển thị Items
        const items = JSON.parse(data.Items_JSON || '[]');
        const container = document.getElementById('itemsContainer');
        container.innerHTML = ''; // Clear cũ
        
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `
            <div>
              <b>${item.name}</b><br>
              <span class="tag ${getCatClass(item.category)}">${item.category}</span>
            </div>
            <b>${Number(item.amount).toLocaleString()}đ</b>
          `;
          container.appendChild(div);
        });

      } catch (e) {
        document.getElementById('loading').textContent = 'Lỗi kết nối AI: ' + e.message;
      }
    }

    function getCatClass(cat) {
      if (cat === 'Ăn uống') return 'eat';
      if (cat === 'Học tập') return 'study';
      if (cat === 'Giải trí') return 'fun';
      return 'other';
    }

    analyze();
  </script>
</body>
</html>
