<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Phân Tích Tài Chính Chi Tiết</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f7fb; color: #172033; }
    .page { width: min(1000px, calc(100% - 32px)); margin: auto; padding: 30px 0; }
    .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .month-picker { padding: 8px 12px; border-radius: 8px; border: 1px solid #d0d5dd; font-size: 16px; font-weight: bold; }
    .card { background: #fff; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    .metric-box { display: flex; flex-wrap: wrap; gap: 15px; }
    .metric { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px; flex: 1; }
    .metric label { font-size: 13px; color: #64748b; display: block; margin-bottom: 5px; }
    .metric b { font-size: 18px; color: #0f172a; }
    .highlight-card { background: #1e293b; color: #fff; padding: 20px; border-radius: 12px; }
    .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
    #loading { text-align: center; padding: 50px; font-size: 20px; color: #64748b; }
    h3 { margin-top: 0; color: #1e293b; font-size: 18px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header-box">
      <h1>📊 Dashboard Tài Chính</h1>
      <div style="display: flex; gap: 10px; align-items: center;">
        <button onclick="window.location.href='AI.html'" style="background: #e2e8f0; color: #1e293b; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold;">
          ⬅ Nhập mới
        </button>
        <input type="month" id="monthPicker" class="month-picker" onchange="analyze()">
      </div>
    </div>
    
    <div id="loading"> phân tích dữ liệu...</div>
    
    <div id="mainContent" style="display:none;">
      <div class="grid">
        <div class="metric-box">
          <div class="metric"><label>Hôm nay</label><b id="todayTotal" style="color:#ef4444;">0đ</b></div>
          <div class="metric"><label>Trạng thái ngân sách</label><b id="statusText">--</b></div>
          <div class="metric"><label>Dự báo chi cuối tháng</label><b id="prediction">0đ</b></div>
          <div class="metric"><label>Nhóm chi chính</label><b id="mainCategory">--</b></div>
          <div class="metric" style="border-top: 3px solid #3b82f6;"><label>Tổng tuần này</label><b id="weeklyTotal">0đ</b></div>
          <div class="metric" style="border-top: 3px solid #a855f7;"><label>Tổng tháng này</label><b id="monthlyTotal">0đ</b></div>
        </div>
        <div class="highlight-card">
          <h3>🔮 Gợi ý thông minh</h3>
          <p id="smartAdvice" style="line-height: 1.6;"></p>
        </div>
      </div>

      <div class="grid" style="margin-top: 20px;">
        <div class="card"><h3>🍕 Phân bổ danh mục</h3><canvas id="categoryChart"></canvas></div>
        <div class="card"><h3>📊 So sánh chi tiêu</h3><canvas id="trendChart"></canvas></div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>📝 Chi tiết vừa nhập</h3>
          <div id="itemsContainer"></div>
        </div>
        <div class="card">
          <h3>📅 Toàn bộ lịch sử giao dịch</h3>
          <div id="historyContainer" style="max-height: 400px; overflow-y: auto; padding-right: 10px;">
            <p style="text-align: center; color: #64748b; padding: 20px;">Đang tải lịch sử...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const today = new Date();
    const currentYYYYMM = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
    document.getElementById('monthPicker').value = currentYYYYMM;

    let chart1 = null, chart2 = null; 

    function drawCharts(historyList, todayTotal, weeklyTotal, monthlyTotal) {
        if(chart1) chart1.destroy();
        if(chart2) chart2.destroy();

        const catMap = {};
        historyList.forEach(i => {
            const cat = i.category || 'Khác';
            catMap[cat] = (catMap[cat] || 0) + (Number(i.amount) || 0);
        });

        chart1 = new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: { 
                labels: Object.keys(catMap), 
                datasets: [{ 
                    data: Object.values(catMap), 
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#64748b'] 
                }] 
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });

        chart2 = new Chart(document.getElementById('trendChart'), {
            type: 'bar',
            data: { 
                labels: ['Hôm nay', 'Tuần này', 'Tháng này'], 
                datasets: [{ 
                    label: 'Số tiền (VNĐ)', 
                    data: [todayTotal, weeklyTotal, monthlyTotal], 
                    backgroundColor: ['#ef4444', '#3b82f6', '#a855f7'] 
                }] 
            },
            options: { 
                scales: { y: { beginAtZero: true } },
                plugins: { legend: { display: false } }
            }
        });
    }

    async function analyze() {
        const inputStr = localStorage.getItem('expense_input');
        if (!inputStr) {
            document.getElementById('loading').innerText = "Vui lòng nhập liệu từ trang AI.html trước!";
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';

        try {
            let payloadObj = JSON.parse(inputStr);
            payloadObj.Target_Month = document.getElementById('monthPicker').value;
            
            const response = await fetch('https://truongmaiquochoang.app.n8n.cloud/webhook/expense-analyzer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payloadObj)
            });            
            
            const data = await response.json();

            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            const todayTotal = Number(data.Today_Total) || 0;
            const weeklyTotal = Number(data.Weekly_Total) || 0;
            const monthlyTotal = Number(data.Monthly_Total) || 0;

            document.getElementById('todayTotal').innerText = todayTotal.toLocaleString() + 'đ';
            document.getElementById('weeklyTotal').innerText = weeklyTotal.toLocaleString() + 'đ';
            document.getElementById('monthlyTotal').innerText = monthlyTotal.toLocaleString() + 'đ';
            document.getElementById('statusText').innerText = data.Budget_Status || 'Bình thường';
            document.getElementById('prediction').innerText = (data.Prediction || 0).toLocaleString() + 'đ';
            document.getElementById('mainCategory').innerText = data.Category || '--';
            document.getElementById('smartAdvice').innerText = data.Smart_Advice || 'Hãy tiếp tục theo dõi chi tiêu nhé!';

            const itemsFromAI = typeof data.Items_JSON === 'string' ? JSON.parse(data.Items_JSON || '[]') : (data.Items_JSON || []);
            const itemsContainer = document.getElementById('itemsContainer');
            itemsContainer.innerHTML = ''; 
            itemsFromAI.forEach(item => {
                itemsContainer.innerHTML += `<div class="item"><span>${item.name}</span><b>${(Number(item.amount) || 0).toLocaleString()}đ</b></div>`;
            });

            const historyList = JSON.parse(data.History_List || '[]');
            const historyContainer = document.getElementById('historyContainer');
            historyContainer.innerHTML = ''; 

            if (historyList.length === 0) {
                historyContainer.innerHTML = '<p style="text-align: center; padding: 20px;">Chưa có dữ liệu lịch sử.</p>';
            } else {
                historyList.forEach(rec => {
                    historyContainer.innerHTML += `
                        <div class="item" style="border-left: 4px solid #cbd5e1; padding-left: 10px; margin-bottom: 10px; align-items: center;">
                            <div style="flex: 1;">
                                <small style="color: #64748b; font-size: 11px;">${rec.date} • ${rec.category}</small>
                                <div style="font-weight: 500; color: #334155;">${rec.content}</div>
                            </div>
                            <b style="color: #1e293b;">${(Number(rec.amount) || 0).toLocaleString()}đ</b>
                        </div>`;
                });
            }

            drawCharts(historyList, todayTotal, weeklyTotal, monthlyTotal);

        } catch (e) {
            document.getElementById('loading').innerText = "Lỗi kết nối n8n: " + e.message;
            console.error(e);
        }
    }

    analyze();
  </script>
</body>
</html>
